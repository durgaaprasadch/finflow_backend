server:
  port: 8083
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finflow_admin?createDatabaseIfNotExist=true
    username: root
    password: Durga@123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

rabbitmq:
  exchange: loan.exchange

resilience4j:
  circuitbreaker:
    instances:
      applicationService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 3
        waitDurationInOpenState: 5000ms
        failureRateThreshold: 50
  retry:
    instances:
      applicationService:
        maxAttempts: 3
        waitDuration: 2000ms

springdoc:
  api-docs:
    path: /api/v1/admin/v3/api-docs
