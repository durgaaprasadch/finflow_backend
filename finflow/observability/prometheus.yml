global:
  scrape_interval: 10s # Slightly longer for stability
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'finflow-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'auth-service:8081'
          - 'application-service:8082'
          - 'admin-service:8083'
          - 'document-service:8084'
          - 'notification-service:8085'
          - 'config-server:8888'
          - 'eureka-server:8761'
          - 'api-gateway:8080'

  # Add monitoring for the infrastructure itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
