server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: finflow-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: finflow-services
          __path__: /var/log/finflow/**/logs/*.log
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}T'
          max_lines: 128
      - regex:
          expression: '^(?P<time>[^ ]+) +(?P<level>[^ ]+) +\[(?P<service>[^,]*),(?P<traceId>[^,]*),(?P<spanId>[^\]]*)\] +(?P<pid>\d+) --- \[(?P<thread>[^\]]+)\] +(?P<class>[^ ]+) +: +(?P<message>.*)$'
      - labels:
          level:
          service:
          traceId:
          spanId:
