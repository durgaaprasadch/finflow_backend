apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    editable: false

  - name: Zipkin
    type: tempo # Grafana Tempo is often used, but we'll use Zipkin compatibility or Link
    url: http://zipkin:9411
    access: proxy
    editable: false
